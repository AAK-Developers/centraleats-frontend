name: CD - Frontend Production Environment

on:
  repository_dispatch:
    types: [ backend-deployed ] # Escucha el evento disparado por el backend en producción
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Calculate Release Tag
      id: calculate-tag
      run: |
        git fetch --tags || true
        LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
        if [ -z "$LATEST_TAG" ]; then
          NEW_TAG="v1.0.0"
        else
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
        fi
        echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
        echo "Calculated tag: ${NEW_TAG}"

    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.calculate-tag.outputs.new_tag }}
        git push origin ${{ steps.calculate-tag.outputs.new_tag }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Promote Docker Image
      run: |
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:qa
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:qa ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:${{ steps.calculate-tag.outputs.new_tag }}
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:qa ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:${{ steps.calculate-tag.outputs.new_tag }}
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST_PROD }}
        username: ${{ secrets.AWS_SSH_USER_PROD }}
        key: ${{ secrets.AWS_SSH_KEY_PROD }}
        script: |
          echo "==== Iniciando despliegue de centraleats-frontend (Production) ===="
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:latest
          
          # Respaldar y renovar contenedor del frontend
          if docker ps -a --format '{{.Names}}' | grep -Eq "^centraleats-frontend-prod$"; then
            docker rm -f centraleats-frontend-prod-old || true
            docker stop centraleats-frontend-prod || true
            docker rename centraleats-frontend-prod centraleats-frontend-prod-old || true
            HAS_OLD=true
          else
            HAS_OLD=false
          fi
          
          echo "Levantando nuevo contenedor de Frontend en puerto 8080..."
          docker run -d --name centraleats-frontend-prod \
            -p 8080:80 \
            -e BACKEND_ADDR="${{ secrets.BACKEND_ADDR_PROD }}" \
            -e VITE_API_BASE_URL="${{ secrets.VITE_API_URL_PROD }}" \
            -e VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_PROD }}" \
            -e VITE_APP_ENV="production" \
            ${{ secrets.DOCKERHUB_USERNAME }}/centraleats-frontend:latest
            
          # Smoke Test simple del Frontend
          sleep 5
          if curl -s -f http://localhost:8080/ > /dev/null; then
            echo "==== DESPLIEGUE DE FRONTEND EXITOSO ===="
            if [ "$HAS_OLD" = "true" ]; then
              docker rm -f centraleats-frontend-prod-old || true
            fi
          else
            echo "==== ERROR EN EL FRONTEND. Revirtiendo... ===="
            docker stop centraleats-frontend-prod || true
            docker rm -f centraleats-frontend-prod || true
            if [ "$HAS_OLD" = "true" ]; then
              docker rename centraleats-frontend-prod-old centraleats-frontend-prod || true
              docker start centraleats-frontend-prod || true
            fi
            exit 1
          fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.calculate-tag.outputs.new_tag }}
        name: Release ${{ steps.calculate-tag.outputs.new_tag }}
        generate_release_notes: true

    - name: Send Discord Notification (Success)
      if: success() && env.DISCORD_WEBHOOK != ''
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        curl -H "Content-Type: application/json" -X POST -d '{
          "username": "GitHub Actions",
          "embeds": [{
            "title": "Despliegue Exitoso :white_check_mark:",
            "description": "El frontend de **CentralEats** se ha desplegado correctamente en el entorno de Producción.",
            "color": 3066993,
            "fields": [
              {"name": "Entorno", "value": "producción", "inline": true},
              {"name": "Versión / Tag", "value": "${{ steps.calculate-tag.outputs.new_tag }}", "inline": true},
              {"name": "Commit SHA", "value": "${{ github.sha }}", "inline": false}
            ],
            "footer": {
              "text": "Ejecutado por ${{ github.actor }}"
            }
          }]
        }' "$DISCORD_WEBHOOK"

    - name: Send Discord Notification (Failure)
      if: failure() && env.DISCORD_WEBHOOK != ''
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        curl -H "Content-Type: application/json" -X POST -d '{
          "username": "GitHub Actions",
          "embeds": [{
            "title": "Fallo en el Despliegue :x:",
            "description": "Ha fallado el despliegue del frontend de **CentralEats** en Producción. Se ha ejecutado el rollback automático al contenedor estable anterior.",
            "color": 15158332,
            "fields": [
              {"name": "Entorno", "value": "producción", "inline": true},
              {"name": "Versión / Tag", "value": "${{ steps.calculate-tag.outputs.new_tag }}", "inline": true},
              {"name": "Commit SHA", "value": "${{ github.sha }}", "inline": false}
            ],
            "footer": {
              "text": "Ejecutado por ${{ github.actor }}"
            }
          }]
        }' "$DISCORD_WEBHOOK"
