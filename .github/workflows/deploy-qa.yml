name: Deploy to QA (AWS EC2 + Docker Hub)

on:
  push:
    branches:
      - QA
  repository_dispatch:
    types: [deploy-qa]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  build-and-push:
    needs: ci
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      image_tag: qa
      vite_app_env: qa
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_URL_QA }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_QA }}

  deploy:
    needs: build-and-push
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: qa
      image_tag: qa
      smoke_test_url: http://localhost:80
    secrets:
      AWS_HOST: ${{ secrets.AWS_HOST_QA }}
      AWS_SSH_USER: ${{ secrets.AWS_SSH_USER_QA }}
      AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY_QA }}
      BACKEND_ADDR: ${{ secrets.BACKEND_ADDR_QA }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
